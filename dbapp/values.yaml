replicaCount: 1

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

# The ghost that's haunting you:
httpRoute:
  enabled: false

# Adding these just in case your templates look for them too
autoscaling:
  enabled: false
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
